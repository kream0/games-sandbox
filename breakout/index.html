<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Breakout - Three.js</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
        }

        /* ─── HUD overlay ─────────────────────────────── */
        #hud {
            position: absolute;
            top: 20px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-end;
            pointer-events: none;
        }

        .panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 14px 20px;
            min-width: 110px;
            pointer-events: auto;
        }

        .panel .label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .panel .value {
            color: #fff;
            font-size: 24px;
            font-weight: 800;
        }

        #lives {
            font-size: 20px;
            letter-spacing: 4px;
        }

        /* ─── Restart button ──────────────────────────── */
        #restart-btn {
            position: absolute;
            top: 20px;
            left: 24px;
            pointer-events: auto;
            background: #e94560;
            border: none;
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            z-index: 10;
        }

        #restart-btn:hover {
            background: #ff6b81;
            transform: scale(1.05);
        }

        /* ─── Game over overlay ──────────────────────── */
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            background: rgba(0, 0, 0, 0.5);
        }

        #game-over.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #game-over h1 {
            color: #e94560;
            font-size: 52px;
            font-weight: 900;
            text-shadow: 0 0 40px rgba(233, 69, 96, 0.5);
        }

        #game-over .sub {
            color: #bbb;
            font-size: 18px;
            margin-top: 12px;
        }

        /* ─── Pause overlay ──────────────────────────── */
        #pause-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 40px;
            font-weight: 800;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            text-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        #pause-msg.visible {
            opacity: 1;
        }

        /* ─── Controls hint ─────────────────────────── */
        #controls-hint {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.2);
            font-size: 13px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 18px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }

        /* ─── Volume controls ──────────────────────── */
        #volume-controls {
            position: absolute;
            bottom: 70px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: auto;
            z-index: 10;
        }

        #volume-controls label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        #volume-controls input[type="range"] {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        #volume-controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #888;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- Restart -->
    <button id="restart-btn">↻</button>

    <!-- HUD -->
    <div id="hud">
        <div class="panel">
            <div class="label">Score</div>
            <div class="value" id="score">0</div>
        </div>
        <div class="panel">
            <div class="label">Lives</div>
            <div class="value" id="lives">♥♥♥</div>
        </div>
    </div>

    <!-- Game Over -->
    <div id="game-over">
        <h1>GAME OVER</h1>
        <div class="sub">Press <strong>R</strong> to restart</div>
    </div>

    <!-- Pause -->
    <div id="pause-msg">⏸ PAUSED</div>

    <!-- Controls hint -->
    <div id="controls-hint">
        🖱 move mouse &middot; click launch &middot; P pause &middot; R restart
    </div>

    <!-- Volume controls -->
    <div id="volume-controls">
        <label>
            <span>&#x1F509;</span>
            <input type="range" id="sfx-volume" min="0" max="1" step="0.05" value="0.6">
        </label>
    </div>

    <!-- Import map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="./js/main.js"></script>

</body>

</html>
